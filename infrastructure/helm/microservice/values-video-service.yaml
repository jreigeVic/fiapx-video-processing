# helm upgrade --install video-service ./microservice -n fiapx \
#   -f values-video-service.yaml -f ../generated/values-video-service.aws.yaml
#
# The second -f is produced by ../render-aws-values.sh from `terraform output`
# (RDS endpoint, S3 bucket name, region) - see infrastructure/helm/README.md.
# It is never committed: only this file's static defaults are.

nameOverride: video-service

image:
  repository: "REPLACE_WITH_ECR_REPOSITORY_URL" # terraform output ecr_repository_urls.video-service
  tag: "latest"

containerPort: 8082

service:
  enabled: true
  type: LoadBalancer
  port: 80

probes:
  http: true
  path: /actuator/health

autoscaling:
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

envFrom:
  - secretRef: fiapx-db-credentials
  - secretRef: fiapx-jwt-secret

# PORT and AWS_REGION are not set here: application.yml already defaults
# them to 8082 / us-east-1. `env` is populated entirely by the generated
# AWS overlay above (SPRING_DATASOURCE_URL, VIDEO_S3_BUCKET) - Helm
# replaces list values wholesale across -f files, so it must not be split
# across two files. AWS_ENDPOINT_URL is intentionally left unset: blank
# means the SDK talks to real AWS using the node's LabRole instance
# profile (infrastructure/terraform/iam.tf), not LocalStack.
