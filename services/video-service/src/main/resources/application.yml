spring:
  application:
    name: video-service
  datasource:
    url: jdbc:postgresql://localhost:5432/video_db
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}

flyway:
  enabled: true
  locations: classpath:db/migration

fiapx:
  security:
    jwt:
      secret: ${JWT_SECRET:CHANGE_ME_DEV_ONLY_SECRET_KEY_MIN_32_BYTES_LONG_0000}
  aws:
    region: ${AWS_REGION:us-east-1}
    endpoint-override: ${AWS_ENDPOINT_URL:}
    s3:
      bucket: ${VIDEO_S3_BUCKET:fiapx-videos}
      download-url-ttl-seconds: ${VIDEO_DOWNLOAD_URL_TTL_SECONDS:900}
    sns:
      video-uploaded-topic: ${VIDEO_UPLOADED_TOPIC:video-uploaded}
    sqs:
      video-results-queue: ${VIDEO_RESULTS_QUEUE:video-results-queue}
      poll-delay-ms: ${VIDEO_RESULTS_POLL_DELAY_MS:5000}
      consumer-enabled: ${VIDEO_RESULTS_CONSUMER_ENABLED:true}

server:
  port: ${PORT:8082}

