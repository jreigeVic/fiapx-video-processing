spring:
  application:
    name: video-service
  datasource:
    url: jdbc:postgresql://localhost:5432/video_db
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  # Spring's own multipart resolver rejects oversized requests before they
  # reach the controller, so this must stay >= fiapx.upload.max-file-size-bytes
  # below (100MB default) or every real upload gets rejected by the default
  # 1MB Spring Boot limit.
  servlet:
    multipart:
      max-file-size: ${VIDEO_UPLOAD_MAX_FILE_SIZE:100MB}
      max-request-size: ${VIDEO_UPLOAD_MAX_REQUEST_SIZE:105MB}

flyway:
  enabled: true
  locations: classpath:db/migration

fiapx:
  security:
    jwt:
      secret: ${JWT_SECRET:CHANGE_ME_DEV_ONLY_SECRET_KEY_MIN_32_BYTES_LONG_0000}
    # No frontend origin allowed by default (secure-by-default); the demo
    # frontend (Epic 013) sets VIDEO_CORS_ALLOWED_ORIGINS to its own origin.
    cors:
      allowed-origins: ${VIDEO_CORS_ALLOWED_ORIGINS:}
  upload:
    max-file-size-bytes: ${VIDEO_UPLOAD_MAX_FILE_SIZE_BYTES:104857600}
    allowed-content-types: ${VIDEO_UPLOAD_ALLOWED_CONTENT_TYPES:video/mp4,video/mpeg,video/quicktime,video/x-msvideo,video/x-matroska}
  aws:
    region: ${AWS_REGION:us-east-1}
    endpoint-override: ${AWS_ENDPOINT_URL:}
    s3:
      bucket: ${VIDEO_S3_BUCKET:fiapx-videos}
      download-url-ttl-seconds: ${VIDEO_DOWNLOAD_URL_TTL_SECONDS:900}
    sns:
      video-uploaded-topic: ${VIDEO_UPLOADED_TOPIC:video-uploaded}
    sqs:
      video-results-queue: ${VIDEO_RESULTS_QUEUE:video-results-queue}
      poll-delay-ms: ${VIDEO_RESULTS_POLL_DELAY_MS:5000}
      consumer-enabled: ${VIDEO_RESULTS_CONSUMER_ENABLED:true}

server:
  port: ${PORT:8082}

