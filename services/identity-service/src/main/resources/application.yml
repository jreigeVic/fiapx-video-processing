spring:
  application:
    name: identity-service
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}

flyway:
  enabled: true
  locations: classpath:db/migration

fiapx:
  security:
    jwt:
      secret: ${JWT_SECRET:CHANGE_ME_DEV_ONLY_SECRET_KEY_MIN_32_BYTES_LONG_0000}
      access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_TTL_SECONDS:900}
      refresh-token-expiration-seconds: ${JWT_REFRESH_TOKEN_TTL_SECONDS:604800}

server:
  port: ${PORT:8081}

